# Specify the Docker Compose file format version
version: '3.8'

services:
  # Define the Go application service
  app:
    # Build the Docker image from the Dockerfile in the current directory
    build: .
    # Expose port 8080 to linked services (not to the host machine)
    expose:
      - "8080"
    # Ensure the app service restarts automatically
    restart: unless-stopped
    # Healthcheck for the Go app to ensure it’s ready before the proxy starts
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    # Connect the app service to the app-network network
    networks:
      - app-network

  # Define the Nginx proxy service
  proxy:
    # Use the latest official Nginx image from Docker Hub
    image: nginx:1.27.3-alpine
    # Map port 80 inside the container to port 8080 on the host machine
    ports:
      - "8080:80"
    # Mount the nginx.conf file into the container with read-only access
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # Ensure the proxy service starts after the app service
    depends_on:
      - app
    # Connect the proxy service to the app-network network
    networks:
      - app-network

# Define the network to allow communication between services
networks:
  app-network:
    # Using the default bridge driver; no additional configuration needed
