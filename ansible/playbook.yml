---
- name: Install and Register GitLab Runner on Ubuntu
  hosts: gitlab_runner_server
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker official GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
        filename: docker

    - name: Install Docker and dependencies
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add gitlab-runner user to the Docker group
      ansible.builtin.user:
        name: gitlab-runner
        groups: docker
        append: yes

    - name: Add GitLab's official repository GPG key
      ansible.builtin.apt_key:
        url: https://packages.gitlab.com/gpg.key
        state: present

    - name: Add GitLab Runner repository
      ansible.builtin.apt_repository:
        repo: "deb https://packages.gitlab.com/runner/gitlab-runner/ubuntu/ {{ ansible_lsb.codename }} main"
        state: present
        filename: gitlab-runner

    - name: Install GitLab Runner package
      apt:
        name: gitlab-runner
        state: present

    - name: Register the GitLab Runner
      command: >
        gitlab-runner register
        --non-interactive
        --url {{ gitlab_registration_url }}
        --registration-token {{ gitlab_registration_token }}
        --executor docker
        --docker-image "docker:latest"
        --description "{{ gitlab_runner_description }}"
        --tag-list "{{ gitlab_runner_tags }}"
        --run-untagged="true"
        --locked="false"
        --docker-volumes /var/run/docker.sock:/var/run/docker.sock
      args:
        creates: /etc/gitlab-runner/config.toml

    - name: Ensure GitLab Runner service is running
      systemd:
        name: gitlab-runner
        state: started
        enabled: yes

