# Define the events block (mandatory in Nginx configuration, even if empty)
events {}

# Configure the HTTP server settings
http {
    # Define a custom log format called 'main'
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Specify the location of the access log and use the 'main' log format
    access_log /var/log/nginx/access.log main;

    # Define the server configuration
    server {
        # Listen on port 80 (the default HTTP port)
        listen 80;

        # Define how to handle requests to the root path '/'
        location / {
            # Proxy all requests to the upstream server at 'app' on port 8080
            # 'app' is the hostname of your Go application service
            proxy_pass http://app:8080;

            # Set headers to pass the original host and client IP address to the upstream server
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Adding security headers
            proxy_set_header X-Content-Type-Options "nosniff";

            # Enable proxy buffering (optional, can improve performance)
            # proxy_buffering on;

            # Handle timeouts and retries (optional configuration)
            # proxy_connect_timeout 60s;
            # proxy_read_timeout 60s;
            # proxy_send_timeout 60s;
        }
    }
}
